name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: "Digite APPLY para confirmar a criação dos recursos na AWS"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_allowed_public_ip_cidr: ${{ vars.ALLOWED_PUBLIC_IP_CIDR }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  apply:
    name: Apply approved infrastructure
    runs-on: ubuntu-latest

    if: ${{ github.event.inputs.confirm_apply == 'APPLY' }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::362552859209:role/github-actions-terraform-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Terraform init
        run: terraform init -input=false -reconfigure

      - name: Terraform fmt
        run: terraform fmt -recursive -check

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan.binary

      - name: Convert plan to JSON
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Run Rego security policies before apply
        run: |
          opa eval \
            --fail-defined \
            --format pretty \
            --data ../policy/terraform_security.rego \
            --input tfplan.json \
            'data.terraform.security.deny[_]'

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan.binary
