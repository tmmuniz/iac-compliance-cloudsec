name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: "Digite APPLY para confirmar a criação dos recursos na AWS"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_allowed_public_ip_cidr: ${{ vars.ALLOWED_PUBLIC_IP_CIDR }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_prowler_reports_bucket_name: ${{ vars.PROWLER_REPORTS_BUCKET }}
  TF_VAR_github_repository: ${{ github.repository }}
  PROWLER_REPORTS_BUCKET: ${{ vars.PROWLER_REPORTS_BUCKET }}

jobs:
  apply:
    name: Apply approved infrastructure
    runs-on: ubuntu-latest

    if: ${{ github.event.inputs.confirm_apply == 'APPLY' }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ARN_OIDC_TERRAFORM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Terraform init
        run: terraform init -input=false -reconfigure

      - name: Terraform fmt
        run: terraform fmt -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan.binary

      - name: Convert plan to JSON
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Run Rego security policies before apply
        run: |
          opa eval \
            --fail-defined \
            --format pretty \
            --data ../policy/terraform_security.rego \
            --input tfplan.json \
            'data.terraform.security.deny[_]'

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan.binary

  prowler:
    name: Run Prowler and upload report
    runs-on: ubuntu-latest
    needs: apply

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC - Prowler
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ARN_OIDC_PROWLER_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          TF_VAR_prowler_reports_bucket_name: ${{ vars.PROWLER_REPORTS_BUCKET }}
          TF_VAR_github_repository: ${{ github.repository }}
          PROWLER_REPORTS_BUCKET: ${{ vars.PROWLER_REPORTS_BUCKET }}

      - name: Install Prowler
        run: pipx install prowler

      - name: Run Prowler AWS scan
        run: |
          prowler aws \
            --region $AWS_REGION \
            --output-formats html json \
            --output-directory prowler-output

      - name: Upload Prowler HTML report to private S3 bucket
        run: |
          REPORT_FILE=$(find prowler-output -name "*.html" | head -n 1)

          aws s3 cp "$REPORT_FILE" \
            "s3://$PROWLER_REPORTS_BUCKET/prowler/index.html" \
            --content-type "text/html"

      - name: Upload Prowler report as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: prowler-report
          path: prowler-output
