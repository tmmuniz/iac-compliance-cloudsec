name: Terraform Plan + Rego Policy Check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  # Configure em Settings > Secrets and variables > Actions > Variables.
  # Exemplo: ALLOWED_PUBLIC_IP_CIDR=200.10.10.10/32
  TF_VAR_allowed_public_ip_cidr: ${{ vars.ALLOWED_PUBLIC_IP_CIDR }}

jobs:
  plan:
    name: Validate Terraform and Rego policies
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      # Sem OIDC: usa credenciais do usuário IAM criadas previamente na AWS.
      # Cadastre estes secrets no GitHub:
      # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY e, se aplicável, AWS_SESSION_TOKEN.
      - name: Configure AWS credentials with access key
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          allowed_public_ip_cidr: ${{ vars.allowed_public_ip_cidr }}

      - name: Terraform fmt
        run: terraform fmt -recursive -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan.binary

      - name: Convert plan to JSON
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Run Rego security policies
        run: |
          opa eval \
            --fail-defined \
            --format pretty \
            --data ../policy/terraform_security.rego \
            --input tfplan.json \
            'data.terraform.security.deny[_]'
