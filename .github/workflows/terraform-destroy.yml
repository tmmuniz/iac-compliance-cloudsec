name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Digite DESTROY para remover os recursos e evitar custos"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ADM_BUCKET_NAME: ${{ vars.ADM_BUCKET_NAME }}

  TF_VAR_allowed_public_ip_cidr: ${{ vars.ALLOWED_PUBLIC_IP_CIDR }}
  TF_VAR_ssh_public_key: ${{ vars.SSH_PUB_KEY }}
  TF_VAR_adm_bucket_name: ${{ vars.ADM_BUCKET_NAME }}
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_ansible_role_arn: ${{ vars.ARN_OIDC_ANSIBLE_ROLE }}

jobs:
  destroy:
    name: Destroy infrastructure
    runs-on: ubuntu-latest

    if: ${{ github.event.inputs.confirm_destroy == 'DESTROY' }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ARN_OIDC_TERRAFORM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy
        run: terraform destroy -auto-approve