- name: Install required packages
  ansible.builtin.shell: |
    sudo dnf clean all
    sudo dnf makecache --refresh
    sudo dnf install -y nginx awscli cronie
    rpm -q nginx awscli cronie
  args:
    executable: /bin/bash
  changed_when: true

