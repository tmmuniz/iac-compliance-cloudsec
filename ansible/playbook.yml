- name: Configure CloudSec web instances via SSM
  hosts: role_web
  become: true
  # Adicione esta variável para garantir que o SSH/SSM não espere entrada
  vars:
    ansible_ssh_extra_args: '-o BatchMode=yes -o StrictHostKeyChecking=no'
    app_bucket: "{{ lookup('env', 'APP_BUCKET_NAME') }}"
    ansible_python_interpreter: /usr/bin/python3
    # Melhora a estabilidade em conexões instáveis/SSM
    ansible_ssh_pipelining: true 

  pre_tasks:
    - name: Ensure sudo does not ask for password
      ansible.builtin.command: sudo -n true
      changed_when: false
  
  environment:
    # Garante modo não interativo globalmente
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a # Evita prompts de reinicialização de serviços no Debian/Ubuntu

  pre_tasks:
    - name: Validate Sudo access is non-interactive
      ansible.builtin.command: sudo -n true
      changed_when: false
      check_mode: false

  roles:
    - cloudsec_web